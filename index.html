<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="带伞吗">
<meta name="theme-color" content="#1a1a2e">
<title>今天带伞吗？</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700;900&display=swap" rel="stylesheet">
<style>
  :root{--bg-1:#0f0c29;--bg-2:#302b63;--bg-3:#24243e;--text:#e0e0e0;--text-dim:rgba(255,255,255,0.4);--accent:#764ba2;--accent-2:#667eea;--card-bg:rgba(255,255,255,0.06);--card-border:rgba(255,255,255,0.08)}
  .theme-rain{--bg-1:#1a1a2e;--bg-2:#16213e;--bg-3:#0f3460;--text:#aed6f1;--text-dim:rgba(174,214,241,0.5);--accent:#2980b9;--accent-2:#3498db;--card-bg:rgba(15,52,96,0.9);--card-border:rgba(174,214,241,0.1)}
  .theme-clear{--bg-1:#fdf6e3;--bg-2:#fceabb;--bg-3:#f8b500;--text:#3e2723;--text-dim:rgba(93,64,55,0.5);--accent:#f39c12;--accent-2:#e67e22;--card-bg:rgba(255,248,225,0.95);--card-border:rgba(255,220,100,0.3)}
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  body{font-family:'Noto Sans SC',-apple-system,sans-serif;min-height:100vh;min-height:100dvh;background:linear-gradient(160deg,var(--bg-1) 0%,var(--bg-2) 40%,var(--bg-3) 100%);display:flex;flex-direction:column;align-items:center;padding:20px 16px;padding-top:max(20px,env(safe-area-inset-top));padding-bottom:max(20px,env(safe-area-inset-bottom));transition:background 0.8s ease;position:relative;overflow-x:hidden}
  .raindrops{position:fixed;inset:0;pointer-events:none;z-index:0;display:none}.theme-rain .raindrops{display:block}
  .raindrop{position:absolute;top:-10px;background:linear-gradient(to bottom,transparent,rgba(174,214,241,0.4));border-radius:50%;animation:rainfall linear infinite}
  @keyframes rainfall{0%{transform:translateY(-10px);opacity:0}15%{opacity:0.4}100%{transform:translateY(105vh);opacity:0}}
  .sun-glow{position:fixed;top:-80px;right:-60px;width:220px;height:220px;background:radial-gradient(circle,rgba(255,220,100,0.3) 0%,transparent 70%);border-radius:50%;pointer-events:none;z-index:0;display:none;animation:sunpulse 3s ease-in-out infinite}.theme-clear .sun-glow{display:block}
  @keyframes sunpulse{0%,100%{transform:scale(1);opacity:0.3}50%{transform:scale(1.2);opacity:0.45}}
  @keyframes slideUp{from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:translateY(0)}}
  @keyframes fadeIn{from{opacity:0}to{opacity:1}}
  @keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}
  @keyframes shake{0%,100%{transform:rotate(0deg)}25%{transform:rotate(-5deg)}75%{transform:rotate(5deg)}}
  @keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
  .hero-icon{font-size:42px;margin-bottom:6px;animation:bounce 3s ease-in-out infinite}.theme-rain .hero-icon{animation:shake 2s ease-in-out infinite}
  h1{font-size:24px;font-weight:900;color:var(--text);letter-spacing:2px;line-height:1.3}
  .subtitle{font-size:11px;color:var(--text-dim);font-weight:300;letter-spacing:3px;margin-top:3px}

  .map-section{width:100%;max-width:380px;margin:14px 0;animation:slideUp 0.5s ease 0.2s both;z-index:1}

  /* Search bar */
  .search-row{display:flex;gap:6px;margin-bottom:8px}
  .search-row input{flex:1;padding:10px 14px;font-size:13px;border:1px solid var(--card-border);border-radius:10px;background:var(--card-bg);color:var(--text);outline:none;font-family:inherit;backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);min-width:0}
  .search-row input:focus{border-color:var(--accent)}
  .search-row input::placeholder{color:var(--text-dim);font-size:12px}
  .theme-clear .search-row input{background:rgba(255,255,255,0.7);color:#3e2723}
  .search-row button{padding:10px 14px;font-size:13px;border:none;border-radius:10px;cursor:pointer;color:#fff;font-weight:700;font-family:inherit;white-space:nowrap;flex-shrink:0}
  .btn-search{background:linear-gradient(135deg,var(--accent-2),var(--accent))}
  .btn-myloc{background:linear-gradient(135deg,#00b894,#00cec9);font-size:16px!important;padding:10px 12px!important;display:flex;align-items:center}
  .btn-myloc.spin svg{animation:spin 1s linear infinite}

  .map-wrap{width:100%;height:240px;border-radius:16px;overflow:hidden;border:1px solid var(--card-border);box-shadow:0 8px 32px rgba(0,0,0,0.2);position:relative}
  #mapContainer{width:100%;height:100%}
  .map-overlay{position:absolute;bottom:0;left:0;right:0;padding:8px 12px;background:linear-gradient(transparent,rgba(0,0,0,0.6));color:#fff;font-size:11px;pointer-events:none;z-index:10}
  .map-coord{font-weight:700;font-size:12px}
  .map-hint{position:absolute;top:8px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,0.6);color:#fff;padding:4px 12px;border-radius:20px;font-size:11px;pointer-events:none;z-index:10;white-space:nowrap}
  .btn-confirm{display:none;margin-top:10px;width:100%;padding:14px;font-size:15px;border:none;border-radius:14px;cursor:pointer;background:linear-gradient(135deg,#00b894,#00cec9);color:#fff;font-weight:700;font-family:inherit;box-shadow:0 4px 15px rgba(0,184,148,0.3);transition:all 0.3s}
  .btn-confirm.show{display:block;animation:slideUp 0.3s ease}
  .btn-confirm:active{transform:scale(0.97)}
  .saved-info{font-size:11px;color:var(--text-dim);text-align:center;margin-top:6px;opacity:0.7}
  .status-bar{text-align:center;margin-top:6px;font-size:11px;color:var(--text-dim);display:flex;align-items:center;justify-content:center;gap:5px;min-height:16px;line-height:1.4}
  .loc-dot{width:6px;height:6px;border-radius:50%;display:inline-block;flex-shrink:0}
  .loc-dot.ok{background:#00b894;box-shadow:0 0 6px rgba(0,184,148,0.5)}.loc-dot.err{background:#e74c3c}.loc-dot.loading{background:#f39c12;animation:fadeIn 0.5s ease infinite alternate}

  .card{position:relative;background:var(--card-bg);border-radius:20px;padding:22px;width:100%;max-width:380px;border:1px solid var(--card-border);box-shadow:0 16px 48px rgba(0,0,0,0.25);animation:slideUp 0.5s ease;overflow:hidden;z-index:1;margin-bottom:12px}
  .theme-clear .card{box-shadow:0 16px 48px rgba(0,0,0,0.08)}
  .city-name{font-size:17px;font-weight:700;color:var(--text)}
  .coords-label{font-size:10px;color:var(--text-dim);opacity:0.6;font-weight:300;margin-top:2px}
  .temp{font-size:50px;font-weight:900;line-height:1;margin:8px 0 4px;letter-spacing:-2px}
  .theme-rain .temp{color:#aed6f1}.theme-clear .temp{color:#e67e22}
  .details{font-size:12px;color:var(--text-dim);margin-bottom:14px;line-height:1.6}
  .alert{border-radius:14px;padding:14px;margin-bottom:14px}
  .alert-rain{background:linear-gradient(135deg,rgba(231,76,60,0.15),rgba(192,57,43,0.1));border:1px solid rgba(231,76,60,0.2)}
  .alert-clear{background:linear-gradient(135deg,rgba(39,174,96,0.12),rgba(46,204,113,0.08));border:1px solid rgba(39,174,96,0.15)}
  .alert-title{display:flex;align-items:center;gap:8px;font-size:15px;font-weight:700}
  .alert-rain .alert-title{color:#e74c3c}.alert-clear .alert-title{color:#27ae60}
  .alert-sub{font-size:12px;margin-top:6px;line-height:1.6;color:var(--text-dim)}
  .alert-keypoint{font-size:13px;margin-top:6px;color:var(--text);font-weight:500;line-height:1.5}
  .rain-chart-title{font-size:13px;font-weight:700;color:var(--text);margin-bottom:8px}
  .rain-chart{position:relative;height:70px;width:100%;background:rgba(0,0,0,0.1);border-radius:10px;overflow:hidden;margin-bottom:6px}
  .theme-clear .rain-chart{background:rgba(0,0,0,0.04)}
  .rain-bar{position:absolute;bottom:0;background:linear-gradient(to top,rgba(41,128,185,0.7),rgba(52,152,219,0.3));border-radius:2px 2px 0 0}
  .rain-bar.heavy{background:linear-gradient(to top,rgba(231,76,60,0.7),rgba(231,76,60,0.3))}
  .rain-bar.moderate{background:linear-gradient(to top,rgba(243,156,18,0.7),rgba(243,156,18,0.3))}
  .rain-time-labels{display:flex;justify-content:space-between;font-size:10px;color:var(--text-dim)}
  .section-title{font-size:13px;font-weight:700;color:var(--text);margin-bottom:8px}
  .hourly{display:flex;gap:5px;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;padding-bottom:2px}
  .hourly::-webkit-scrollbar{display:none}
  .hour-item{flex:0 0 auto;text-align:center;padding:8px 7px;border-radius:10px;min-width:46px;border:1px solid transparent}
  .hour-item.rain-hour{background:rgba(41,128,185,0.2);border-color:rgba(41,128,185,0.3)}
  .hour-label{font-size:10px;font-weight:500;color:var(--text-dim);margin-bottom:4px}
  .hour-emoji{font-size:16px;margin-bottom:2px}
  .hour-temp{font-size:12px;font-weight:700;color:var(--text)}
  .error-msg{color:#e74c3c;font-size:13px;background:rgba(231,76,60,0.1);padding:10px 16px;border-radius:10px;margin-bottom:12px;text-align:center;max-width:380px;width:100%}
  .powered{text-align:center;font-size:10px;color:var(--text-dim);opacity:0.4;margin-top:12px}
</style>
</head>
<body>
<div class="raindrops" id="raindrops"></div>
<div class="sun-glow"></div>

<div style="text-align:center;margin-bottom:8px;animation:fadeIn 0.8s ease;position:relative;z-index:1">
  <div class="hero-icon" id="heroIcon">🌤️</div>
  <h1 id="heroTitle">今天带伞吗？</h1>
  <div class="subtitle">高德地图 + 彩云天气 · 分钟级降雨</div>
</div>

<div class="map-section">
  <!-- 搜索栏 -->
  <div class="search-row">
    <input type="text" id="searchInput" placeholder="搜索城市/地点（如 绵阳、春熙路）" autocomplete="off">
    <button class="btn-search" onclick="searchPlace()">搜索</button>
    <button class="btn-myloc" id="mylocBtn" onclick="tryAutoLocate()" title="尝试自动定位">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"/><line x1="12" y1="2" x2="12" y2="6"/><line x1="12" y1="18" x2="12" y2="22"/><line x1="2" y1="12" x2="6" y2="12"/><line x1="18" y1="12" x2="22" y2="12"/></svg>
    </button>
  </div>

  <!-- 地图 -->
  <div class="map-wrap">
    <div id="mapContainer"></div>
    <div class="map-hint" id="mapHintTop">👆 点击地图选择你的精确位置</div>
    <div class="map-overlay">
      <div class="map-coord" id="mapCoord">等待选择位置...</div>
    </div>
  </div>
  <button class="btn-confirm" id="confirmBtn" onclick="confirmLocation()">🔍 查询此位置天气</button>
  <div class="saved-info" id="savedInfo"></div>
  <div class="status-bar" id="statusBar"></div>
</div>

<div id="errorBox"></div>
<div id="resultArea"></div>
<div class="powered">定位：高德地图 · 天气：彩云天气 · 1km分辨率</div>

<script>
window._AMapSecurityConfig={securityJsCode:'dd51a7fa733ca2c539c401e047879f34'};
</script>
<script src="https://webapi.amap.com/maps?v=2.0&key=c62e981f36705c1ad2bcd25dca9b3641&plugin=AMap.Geocoder,AMap.PlaceSearch,AMap.Geolocation"></script>
<script>
const CAIYUN_TOKEN='DpS87YWOT1lMMBPB';
let map,marker,selectedLng=null,selectedLat=null,selectedAddr='';

const SKYCON_MAP={CLEAR_DAY:'☀️',CLEAR_NIGHT:'🌙',PARTLY_CLOUDY_DAY:'⛅',PARTLY_CLOUDY_NIGHT:'☁️',CLOUDY:'☁️',LIGHT_HAZE:'🌫️',MODERATE_HAZE:'🌫️',HEAVY_HAZE:'🌫️',LIGHT_RAIN:'🌧️',MODERATE_RAIN:'🌧️',HEAVY_RAIN:'🌧️',STORM_RAIN:'⛈️',FOG:'🌫️',LIGHT_SNOW:'❄️',MODERATE_SNOW:'❄️',HEAVY_SNOW:'❄️',STORM_SNOW:'❄️',DUST:'🌪️',SAND:'🌪️',WIND:'💨'};
const SKYCON_CN={CLEAR_DAY:'晴',CLEAR_NIGHT:'晴',PARTLY_CLOUDY_DAY:'多云',PARTLY_CLOUDY_NIGHT:'多云',CLOUDY:'阴',LIGHT_HAZE:'轻度雾霾',MODERATE_HAZE:'中度雾霾',HEAVY_HAZE:'重度雾霾',LIGHT_RAIN:'小雨',MODERATE_RAIN:'中雨',HEAVY_RAIN:'大雨',STORM_RAIN:'暴雨',FOG:'雾',LIGHT_SNOW:'小雪',MODERATE_SNOW:'中雪',HEAVY_SNOW:'大雪',STORM_SNOW:'暴雪',DUST:'浮尘',SAND:'沙尘',WIND:'大风'};
function isRainSkycon(s){return s&&s.includes('RAIN')}
function getEmoji(s){return SKYCON_MAP[s]||'🌤️'}
function getCN(s){return SKYCON_CN[s]||'未知'}

function createRaindrops(){const c=document.getElementById('raindrops');c.innerHTML='';for(let i=0;i<35;i++){const d=document.createElement('div');d.className='raindrop';const s=1+Math.random()*2;d.style.cssText=`left:${Math.random()*100}%;width:${s}px;height:${s*8}px;animation-duration:${0.6+Math.random()*0.5}s;animation-delay:${Math.random()*2}s;`;c.appendChild(d)}}
createRaindrops();
function setTheme(t){document.body.classList.remove('theme-rain','theme-clear');if(t)document.body.classList.add(t);document.querySelector('meta[name="theme-color"]').content=t==='theme-rain'?'#1a1a2e':t==='theme-clear'?'#fdf6e3':'#0f0c29'}
function showStatus(type,msg){document.getElementById('statusBar').innerHTML=`<span class="loc-dot ${type==='ok'?'ok':type==='err'?'err':'loading'}"></span> ${msg}`}
function showError(msg){document.getElementById('errorBox').innerHTML=`<div class="error-msg">${msg}</div>`;document.getElementById('resultArea').innerHTML=''}

function jsonpFetch(url){return new Promise((resolve,reject)=>{const cb='_cb_'+Math.random().toString(36).substr(2,8);const t=setTimeout(()=>{cl();reject(new Error('请求超时'))},15000);function cl(){delete window[cb];const e=document.getElementById(cb);if(e)e.remove();clearTimeout(t)}window[cb]=function(d){cl();resolve(d)};const s=document.createElement('script');s.id=cb;s.src=url+(url.includes('?')?'&':'?')+'callback='+cb;s.onerror=function(){cl();reject(new Error('网络请求失败'))};document.head.appendChild(s)})}

// ===== 保存/读取位置 =====
function saveLocation(lng,lat,addr){try{localStorage.setItem('weather_loc',JSON.stringify({lng,lat,addr,time:Date.now()}))}catch{}}
function getSavedLocation(){try{const d=JSON.parse(localStorage.getItem('weather_loc'));if(d&&d.lng&&d.lat)return d}catch{}return null}

// ===== 初始化地图 =====
function initMap(){
  const saved=getSavedLocation();
  const center=saved?[saved.lng,saved.lat]:[104.07,30.67];
  const zoom=saved?15:12;

  map=new AMap.Map('mapContainer',{
    zoom:zoom,center:center,
    mapStyle:'amap://styles/dark',
    touchZoom:true,dragEnable:true,zoomEnable:true
  });

  // 点击地图
  map.on('click',function(e){
    const lng=e.lnglat.getLng(),lat=e.lnglat.getLat();
    setMapPin(lng,lat);
    reverseGeocode(lng,lat);
  });

  // 有保存的坐标→自动查天气
  if(saved){
    setMapPin(saved.lng,saved.lat);
    selectedAddr=saved.addr||'';
    document.getElementById('mapCoord').innerHTML=`📍 ${saved.addr||''} (${saved.lng.toFixed(4)}, ${saved.lat.toFixed(4)})`;
    document.getElementById('savedInfo').textContent='✅ 已加载上次位置 · 点地图可更换';
    document.getElementById('mapHintTop').textContent='✓ 点地图可更换位置';
    fetchWeather(saved.lng,saved.lat,saved.addr);
  }

  // 后台静默尝试自动定位（成功则移动地图中心，不强制）
  tryAutoLocateSilent();
}

function setMapPin(lng,lat){
  selectedLng=lng;selectedLat=lat;
  if(marker){marker.setPosition([lng,lat])}
  else{marker=new AMap.Marker({position:[lng,lat],anchor:'bottom-center',content:'<div style="font-size:28px;filter:drop-shadow(0 2px 4px rgba(0,0,0,0.3))">📍</div>'});map.add(marker)}
  document.getElementById('confirmBtn').classList.add('show');
  document.getElementById('mapHintTop').textContent='✓ 已选择位置';
}

function reverseGeocode(lng,lat){
  const geocoder=new AMap.Geocoder();
  geocoder.getAddress([lng,lat],function(status,result){
    if(status==='complete'&&result.regeocode){
      const a=result.regeocode.addressComponent;
      selectedAddr=(a.district||a.city||a.province||'')+(a.township||'');
      document.getElementById('mapCoord').innerHTML=`📍 ${selectedAddr} (${lng.toFixed(4)}, ${lat.toFixed(4)})`;
    }else{
      selectedAddr='';
      document.getElementById('mapCoord').innerHTML=`📍 (${lng.toFixed(4)}, ${lat.toFixed(4)})`;
    }
  });
}

// ===== 搜索地点 =====
document.getElementById('searchInput').addEventListener('keydown',e=>{if(e.key==='Enter')searchPlace()});
function searchPlace(){
  const keyword=document.getElementById('searchInput').value.trim();
  if(!keyword)return;
  const ps=new AMap.PlaceSearch({pageSize:1});
  ps.search(keyword,function(status,result){
    if(status==='complete'&&result.poiList&&result.poiList.pois.length>0){
      const poi=result.poiList.pois[0];
      const lng=poi.location.lng,lat=poi.location.lat;
      map.setZoomAndCenter(15,[lng,lat]);
      setMapPin(lng,lat);
      selectedAddr=poi.name||keyword;
      document.getElementById('mapCoord').innerHTML=`📍 ${selectedAddr} (${lng.toFixed(4)}, ${lat.toFixed(4)})`;
      showStatus('ok',`已跳转到「${selectedAddr}」，点地图微调位置`);
    }else{
      showStatus('err','未找到「'+keyword+'」，请换个关键词');
    }
  });
}

// ===== 尝试自动定位（静默，不报错）=====
function tryAutoLocateSilent(){
  const saved=getSavedLocation();
  if(saved)return; // 已有保存位置，不打扰
  const geo=new AMap.Geolocation({enableHighAccuracy:false,timeout:10000,GeoLocationFirst:true,needAddress:true});
  geo.getCurrentPosition(function(status,result){
    if(status==='complete'){
      const lng=result.position.lng,lat=result.position.lat;
      const addr=result.addressComponent?(result.addressComponent.district||result.addressComponent.city||''):'';
      map.setZoomAndCenter(15,[lng,lat]);
      setMapPin(lng,lat);
      selectedAddr=addr;
      document.getElementById('mapCoord').innerHTML=`📍 ${addr} (${lng.toFixed(4)}, ${lat.toFixed(4)})`;
      showStatus('ok',`自动定位成功 · ${addr} · 点地图可微调`);
      // 自动查天气
      saveLocation(lng,lat,addr);
      fetchWeather(lng,lat,addr);
    }
    // 失败也没关系，不显示错误
  });
}

// ===== 手动点击定位按钮 =====
function tryAutoLocate(){
  const btn=document.getElementById('mylocBtn');
  btn.classList.add('spin');
  showStatus('loading','正在尝试自动定位...');
  const geo=new AMap.Geolocation({enableHighAccuracy:true,timeout:15000,GeoLocationFirst:true,needAddress:true});
  geo.getCurrentPosition(function(status,result){
    btn.classList.remove('spin');
    if(status==='complete'){
      const lng=result.position.lng,lat=result.position.lat;
      const addr=result.addressComponent?(result.addressComponent.district||result.addressComponent.city||''):'';
      const acc=result.accuracy?Math.round(result.accuracy):'?';
      map.setZoomAndCenter(16,[lng,lat]);
      setMapPin(lng,lat);
      selectedAddr=addr;
      document.getElementById('mapCoord').innerHTML=`📍 ${addr} (${lng.toFixed(4)}, ${lat.toFixed(4)})`;
      showStatus('ok',`定位成功 · ${addr} · 精度${acc}m`);
      saveLocation(lng,lat,addr);
      fetchWeather(lng,lat,addr);
    }else{
      showStatus('err','自动定位失败，请搜索城市名或点击地图');
    }
  });
}

// ===== 确认位置 =====
function confirmLocation(){
  if(!selectedLng||!selectedLat){showError('请先在地图上点击选择位置');return}
  saveLocation(selectedLng,selectedLat,selectedAddr);
  document.getElementById('savedInfo').textContent='✅ 位置已保存，下次打开自动使用';
  fetchWeather(selectedLng,selectedLat,selectedAddr);
  setTimeout(()=>{const r=document.getElementById('resultArea');if(r.firstChild)r.scrollIntoView({behavior:'smooth',block:'start'})},300);
}

// ===== 获取天气 =====
async function fetchWeather(lng,lat,locationName){
  document.getElementById('errorBox').innerHTML='';
  document.getElementById('resultArea').innerHTML='<div style="text-align:center;color:var(--text-dim);padding:16px;animation:fadeIn 0.3s ease">🔄 加载天气...</div>';
  try{
    const url=`https://api.caiyunapp.com/v2.6/${CAIYUN_TOKEN}/${lng.toFixed(4)},${lat.toFixed(4)}/weather.jsonp?alert=true&dailysteps=1&hourlysteps=24&unit=metric:v2`;
    const data=await jsonpFetch(url);
    if(data.status!=='ok')throw new Error(data.status);
    renderWeather(data,lng,lat,locationName);
  }catch(e){showError('获取天气失败：'+e.message);document.getElementById('resultArea').innerHTML='';setTheme(null)}
}

function renderWeather(data,lng,lat,locationName){
  const rt=data.result.realtime,minutely=data.result.minutely,hourly=data.result.hourly;
  const keypoint=data.result.forecast_keypoint||'';
  const skycon=rt.skycon;
  const hasRain=isRainSkycon(skycon)||(minutely&&minutely.precipitation_2h&&minutely.precipitation_2h.some(v=>v>0.08));
  const isRaining=rt.precipitation&&rt.precipitation.local&&rt.precipitation.local.intensity>0.08;
  setTheme(hasRain?'theme-rain':'theme-clear');
  document.getElementById('heroIcon').textContent=hasRain?'☂️':'☀️';
  document.getElementById('heroTitle').textContent=hasRain?'记得带伞！':'不用带伞';
  let h='';
  h+=`<div class="card"><div class="city-name">${getEmoji(skycon)} ${getCN(skycon)}${locationName?' · '+locationName:''}</div>
    <div class="coords-label">📍 ${lng.toFixed(4)}, ${lat.toFixed(4)}</div>
    <div class="temp">${rt.temperature.toFixed(1)}°</div>
    <div class="details">体感 ${rt.apparent_temperature.toFixed(0)}° · 湿度 ${Math.round(rt.humidity*100)}% · 风速 ${rt.wind.speed.toFixed(1)}km/h<br>
      能见度 ${rt.visibility.toFixed(1)}km${rt.air_quality?' · 空气'+rt.air_quality.description.chn:''}</div>
    <div class="alert ${hasRain?'alert-rain':'alert-clear'}">
      <div class="alert-title"><span>${hasRain?'☂️':'✅'}</span>
        <span>${isRaining?'正在下雨！出门带伞':hasRain?'即将有雨，建议带伞':'当前无雨，放心出门'}</span></div>
      ${keypoint?`<div class="alert-keypoint">${keypoint}</div>`:''}
      ${minutely&&minutely.description?`<div class="alert-sub">${minutely.description}</div>`:''}
    </div></div>`;
  const p=minutely&&minutely.precipitation_2h||[];
  if(p.length>0){const mx=Math.max(...p,0.5);const now=new Date();
    h+=`<div class="card"><div class="rain-chart-title">🔬 未来2小时逐分钟降雨</div><div class="rain-chart">`;
    const bw=100/p.length;
    for(let i=0;i<p.length;i++){const v=p[i],hh=Math.max(v/mx*100,v>0.08?3:0);
      h+=`<div class="rain-bar ${v>10?'heavy':v>3?'moderate':''}" style="left:${i*bw}%;width:${Math.max(bw-0.2,0.5)}%;height:${hh}%"></div>`}
    h+=`</div><div class="rain-time-labels"><span>现在${now.getHours()}:${String(now.getMinutes()).padStart(2,'0')}</span><span>+30min</span><span>+1h</span><span>+1.5h</span><span>+2h</span></div>
      <div style="font-size:11px;color:var(--text-dim);margin-top:6px">${p.every(v=>v<0.08)?'🟢 未来2小时无降雨':'<span style="color:#3498db">■</span>小雨 <span style="color:#f39c12">■</span>中雨 <span style="color:#e74c3c">■</span>大雨'}</div></div>`}
  if(hourly&&hourly.temperature&&hourly.temperature.length>0){
    h+=`<div class="card"><div class="section-title">📊 逐小时预报</div><div class="hourly">`;
    const len=Math.min(hourly.temperature.length,24);
    for(let i=0;i<len;i++){const t=hourly.temperature[i],s=hourly.skycon[i];
      const d=new Date(t.datetime),hr=d.getHours(),isR=isRainSkycon(s.value);
      h+=`<div class="hour-item ${isR?'rain-hour':''}"><div class="hour-label">${hr}时</div><div class="hour-emoji">${getEmoji(s.value)}</div><div class="hour-temp">${t.value.toFixed(0)}°</div></div>`}
    h+=`</div></div>`}
  document.getElementById('resultArea').innerHTML=h;
}

window.addEventListener('load',()=>{setTimeout(initMap,300)});
</script>
</body>
</html>
